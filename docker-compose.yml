version: '3.8'

services:
  # 1. The Message Broker
  redis:
    image: redis
    ports:
      - "6379:6379"

  # 2. The Web Server
  web:
    build: .
    command: python app.py
    ports:
      - "5000:5000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    depends_on:
      - redis

  # 3. The Execution Engine
  worker:
    build: .
    command: celery -A tasks.celery worker --pool=solo --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis

  # 4. The Scheduler
  beat:
    build: .
    command: celery -A tasks.celery beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
  
  # 5. The Reverse Proxy
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
