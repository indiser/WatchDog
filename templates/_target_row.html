<tr id="target-{{ target.id }}" class="row-hover border-b border-slate-800/60 group">
    <td class="px-5 py-4">
        <span class="text-slate-500 font-mono text-sm">#{{ target.id }}</span>
    </td>
    <td class="px-5 py-4">
        <div class="flex items-center gap-2.5">
            <div class="w-2 h-2 rounded-full shrink-0 {% if target.is_active %}bg-emerald-400 status-dot-active{% else %}bg-amber-400{% endif %}"></div>
            <span class="font-mono text-sm text-slate-200 truncate max-w-[320px]" title="{{ target.url }}">{{ target.url }}</span>
        </div>
    </td>
    <td class="px-5 py-4">
        <span class="inline-flex items-center gap-1 font-mono text-xs text-slate-400">
            <svg class="w-3.5 h-3.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            {{ target.interval_minutes }}m
        </span>
    </td>
    <td class="px-5 py-4">
        {% if target.is_active %}
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
            Active
        </span>
        {% else %}
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-500/10 text-amber-400 border border-amber-500/20">
            <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
            Paused
        </span>
        {% endif %}
    </td>
    <td class="px-5 py-4">
        {% if target.last_pinged_at %}
        <span class="font-mono text-xs text-slate-400">{{ target.last_pinged_at.strftime('%b %d, %H:%M:%S') }}</span>
        {% else %}
        <span class="text-xs text-slate-600 italic">Waiting…</span>
        {% endif %}
    </td>
    <td class="px-5 py-4">
        <div class="flex items-center gap-1.5 transition-opacity duration-200">
            <!-- Copy URL -->
            <button
                onclick="copyUrl(this, '{{ target.url }}')"
                class="btn-press p-1.5 rounded-md text-slate-500 hover:text-sky-400 hover:bg-sky-500/10 transition-colors"
                title="Copy URL"
            >
                <svg class="w-4 h-4 copy-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                <svg class="w-4 h-4 check-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
            </button>
            <!-- Toggle active/paused -->
            <button
                hx-patch="/toggle_target/{{ target.id }}"
                hx-target="#target-{{ target.id }}"
                hx-swap="outerHTML swap:0.2s"
                class="btn-press p-1.5 rounded-md text-slate-500 hover:text-slate-300 hover:bg-slate-700/60 transition-colors"
                title="{% if target.is_active %}Pause{% else %}Resume{% endif %}"
            >
                {% if target.is_active %}
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                {% else %}
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
                {% endif %}
            </button>
            <!-- Delete -->
            <button
                hx-delete="/delete_target/{{ target.id }}"
                hx-target="#target-{{ target.id }}"
                hx-swap="outerHTML swap:0.3s"
                hx-confirm="Remove this target?"
                class="btn-press p-1.5 rounded-md text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors"
                title="Delete"
            >
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>
    </td>
</tr>
