events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            # "web" is the exact name of your Flask service in docker-compose.yml
            proxy_pass http://web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}